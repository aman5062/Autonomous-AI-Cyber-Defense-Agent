# This file is automatically merged with docker-compose.yml by Docker Compose.
# It enables BuildKit for all builds so the pip cache mounts in the Dockerfiles work.
# Result: pip packages are cached on disk and never re-downloaded unless
# requirements.txt actually changes.

x-bake-defaults: &bake-defaults
  x-bake:
    cache-from:
      - type=local,src=.docker-cache
    cache-to:
      - type=local,dest=.docker-cache,mode=max
