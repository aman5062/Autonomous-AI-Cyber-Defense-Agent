app:
  name: "AI Cyber Defense Agent"
  version: "1.0.0"
  debug: false
  log_level: "INFO"

database:
  url: "sqlite:////app/data/db/cyber_defense.db"
  echo: false

nginx:
  log_path: "/var/log/nginx/access.log"
  error_log_path: "/var/log/nginx/error.log"

ollama:
  base_url: "http://ollama:11434"
  model: "llama3.2:3b"
  temperature: 0.3
  max_tokens: 1000
  timeout: 120

qdrant:
  host: "qdrant"
  port: 6333
  collection_name: "threat_intelligence"

defense:
  auto_block_enabled: true
  dry_run_mode: false
  whitelist:
    - "127.0.0.1"
    - "::1"
  ban_durations:
    SQL_INJECTION: 86400
    BRUTE_FORCE: 3600
    PATH_TRAVERSAL: 86400
    XSS: 21600
    DDOS: 0
    PORT_SCAN: 172800
    COMMAND_INJECTION: 86400
    DEFAULT: 3600

detection:
  brute_force_threshold: 5
  brute_force_window: 60
  ddos_threshold: 100
  ddos_window: 10

scanning:
  target_host: "testapp"
  target_port: 5000
  scan_interval_hours: 24

nvd:
  api_url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
  api_key: ""
  fetch_on_startup: true
  max_results: 500
