version: '3.8'

services:
  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: cyber_defense_backend
    privileged: true          # Required for iptables
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - OLLAMA_API_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - DATABASE_URL=sqlite:////app/data/db/cyber_defense.db
      - ENABLE_AUTO_BLOCK=true
      - DRY_RUN_MODE=false
      - NGINX_LOG_PATH=/var/log/nginx/access.log
    volumes:
      - ../backend:/app/backend        # Hot-reload during development
      - ../config:/app/config
      - ../data:/app/data
      - nginx_logs:/var/log/nginx:ro   # Read NGINX access log
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    networks:
      - cyber_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Streamlit Dashboard ──────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: cyber_defense_dashboard
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ../dashboard:/app/dashboard
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cyber_net
    restart: unless-stopped

  # ── Ollama LLM ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cyber_defense_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - cyber_net
    restart: unless-stopped
    # Pull the model on first start
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 10
        ollama pull llama3.2:3b || echo "Model pull will retry on next request"
        wait

  # ── Vulnerable Test App ──────────────────────────────────────────
  testapp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.testapp
    container_name: cyber_defense_testapp
    ports:
      - "5000:5000"
    networks:
      - cyber_net
    restart: unless-stopped

  # ── NGINX Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cyber_defense_nginx
    volumes:
      - ../config/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
    depends_on:
      - testapp
      - backend
      - dashboard
    networks:
      - cyber_net
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  cyber_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
