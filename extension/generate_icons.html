<!DOCTYPE html>
<!-- Open this file in a browser, then right-click each canvas and "Save image as" shield16.png, shield48.png, shield128.png -->
<html>
<body style="background:#0d1117; padding:20px; display:flex; gap:20px; align-items:flex-end;">
<script>
function drawShield(size) {
  const canvas = document.createElement('canvas')
  canvas.width = canvas.height = size
  const ctx = canvas.getContext('2d')
  const s = size

  // Background
  const grad = ctx.createLinearGradient(0, 0, s, s)
  grad.addColorStop(0, '#ef4444')
  grad.addColorStop(1, '#991b1b')

  // Shield shape
  ctx.beginPath()
  ctx.moveTo(s*0.5, s*0.06)
  ctx.lineTo(s*0.88, s*0.22)
  ctx.lineTo(s*0.88, s*0.53)
  ctx.quadraticCurveTo(s*0.88, s*0.88, s*0.5, s*0.94)
  ctx.quadraticCurveTo(s*0.12, s*0.88, s*0.12, s*0.53)
  ctx.lineTo(s*0.12, s*0.22)
  ctx.closePath()
  ctx.fillStyle = grad
  ctx.fill()

  // Checkmark
  ctx.strokeStyle = 'white'
  ctx.lineWidth = s * 0.1
  ctx.lineCap = 'round'
  ctx.lineJoin = 'round'
  ctx.beginPath()
  ctx.moveTo(s*0.3, s*0.52)
  ctx.lineTo(s*0.45, s*0.67)
  ctx.lineTo(s*0.72, s*0.38)
  ctx.stroke()

  document.body.appendChild(canvas)
  const label = document.createElement('div')
  label.style.cssText = 'color:white;font-size:11px;text-align:center;margin-top:4px;'
  label.textContent = `${size}x${size}`
  document.body.appendChild(label)
  return canvas
}

[16, 48, 128].forEach(drawShield)
</script>
</body>
</html>
