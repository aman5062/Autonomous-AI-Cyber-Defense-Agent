services:

  # ── Ollama LLM (start this first, stays running across rebuilds) ─────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cyber_defense_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - cyber_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s

  # Pulls llama3.2:3b once Ollama is healthy then exits (skipped if already downloaded)
  ollama-init:
    image: ollama/ollama:latest
    container_name: cyber_defense_ollama_init
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull llama3.2:3b && echo 'Model ready'"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - cyber_net
    restart: "no"

  # ── Qdrant Vector DB ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cyber_defense_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - cyber_net
    restart: unless-stopped

  # ── NGINX reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cyber_defense_nginx
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
    networks:
      - cyber_net
    restart: unless-stopped

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    container_name: cyber_defense_frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cyber_net
    restart: unless-stopped

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: cyber_defense_backend
    privileged: true
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - nginx_logs:/var/log/nginx
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:////app/data/db/cyber_defense.db
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_API_URL=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - SCAN_TARGET=testapp
      - NGINX_LOG_PATH=/var/log/nginx/access.log
      - ENABLE_AUTO_BLOCK=true
      - DRY_RUN_MODE=false
      - ENABLE_EMAIL_REPORTS=${ENABLE_EMAIL_REPORTS:-false}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ALERT_EMAIL=${ALERT_EMAIL:-}
      - TRUSTED_DEVICES=${TRUSTED_DEVICES:-}
      - NETWORK_INTERFACE=${NETWORK_INTERFACE:-}
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - cyber_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: cyber_defense_dashboard
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cyber_net
    restart: unless-stopped

  # ── Vulnerable Test App ──────────────────────────────────────────────────────
  testapp:
    build:
      context: .
      dockerfile: docker/Dockerfile.testapp
    container_name: cyber_defense_testapp
    ports:
      - "5000:5000"
    networks:
      - cyber_net
    restart: unless-stopped

  # ── Demo Dashboard ────────────────────────────────────────────────────────────
  demo:
    build:
      context: .
      dockerfile: docker/Dockerfile.demo
    container_name: cyber_defense_demo
    ports:
      - "8502:8502"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cyber_net
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  nginx_logs:

networks:
  cyber_net:
    driver: bridge
